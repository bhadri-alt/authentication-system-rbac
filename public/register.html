<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>📝 Create Account</h1>

    <p class="subtitle">

        Register to access the Role-Based Authentication System.

    </p>

    <input
        type="text"
        id="username"
        placeholder="Enter Username"
        required
    >

    <input
        type="email"
        id="email"
        placeholder="Enter Email"
        required
    >

    <input
        type="password"
        id="password"
        placeholder="Enter Password"
        required
    >

    <button onclick="register()">

        Register

    </button>

    <br><br>

    <p>

        Already have an account?

        <a href="login.html">

            Login Here

        </a>

    </p>

</div>

<script src="script.js"></script>

</body>

</html>
